<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard - All Tokens</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #0a0a1a; color: #fff; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        h1 { margin-bottom: 20px; color: #5865f2; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { background: #1a1a2e; border-radius: 10px; padding: 20px; flex: 1; min-width: 150px; text-align: center; }
        .stat-number { font-size: 2em; font-weight: bold; color: #5865f2; }
        .stat-label { color: #9494b8; margin-top: 5px; }
        .user-section { background: #1a1a2e; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .user-header { background: #2a2a3e; padding: 15px 20px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; }
        .user-header:hover { background: #3a3a4e; }
        .user-content { padding: 20px; display: none; overflow-x: auto; }
        .user-content.show { display: block; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #2a2a3e; }
        th { color: #9494b8; }
        .valid { color: #57f287; }
        .invalid { color: #ed4245; }
        .copy-btn { background: #5865f2; border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-left: 5px; }
        .copy-btn:hover { background: #4752c4; }
        .refresh-btn { background: #23a55a; border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
        .export-btn { background: #5865f2; border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-left: 10px; }
        .footer { margin-top: 30px; text-align: center; color: #666; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔐 Admin Dashboard - All Tokens</h1>
    
    <div class="stats" id="stats">
        <div class="stat-card">
            <div class="stat-number" id="totalUsers">0</div>
            <div class="stat-label">Total Users</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="totalTokens">0</div>
            <div class="stat-label">Total Tokens</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="validTokens">0</div>
            <div class="stat-label">Valid Tokens</div>
        </div>
    </div>
    
    <div>
        <button class="refresh-btn" onclick="loadAllData()">🔄 Refresh</button>
        <button class="export-btn" onclick="exportData()">📥 Export All Tokens</button>
    </div>
    
    <div id="usersContainer"></div>
    <div class="footer">Only you can see this page. Keep your secret key safe!</div>
</div>

<script>
    const secret = new URLSearchParams(location.search).get('secret');
    
    async function loadAllData() {
        const res = await fetch(`/api/admin/all_tokens?secret=${secret}`);
        const data = await res.json();
        
        if (data.error) {
            document.getElementById('usersContainer').innerHTML = `<div style="color:#ed4245;">❌ ${data.error}</div>`;
            return;
        }
        
        // Update stats
        document.getElementById('totalUsers').innerText = data.total_users;
        document.getElementById('totalTokens').innerText = data.total_tokens;
        
        let validCount = 0;
        for (const [user, tokens] of Object.entries(data.users)) {
            validCount += tokens.filter(t => t.valid).length;
        }
        document.getElementById('validTokens').innerText = validCount;
        
        // Build user sections
        let html = '';
        for (const [user, tokens] of Object.entries(data.users)) {
            html += `
                <div class="user-section">
                    <div class="user-header" onclick="toggleUser('${user.replace(/'/g, "\\'")}')">
                        <span>👤 ${user}</span>
                        <span>📊 ${tokens.length} tokens | ${tokens.filter(t => t.valid).length} valid | ${tokens.reduce((s, t) => s + (t.boosts || 0), 0)} boosts</span>
                    </div>
                    <div class="user-content" id="user-${user.replace(/'/g, "\\'")}">
                        <table>
                            <thead>
                                <tr>
                                    <th>Token Preview</th>
                                    <th>Username</th>
                                    <th>Status</th>
                                    <th>Boosts</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tokens.map(t => `
                                    <tr>
                                        <td><code>${t.token_preview}</code></td>
                                        <td>${t.username || '?'}</td>
                                        <td class="${t.valid ? 'valid' : 'invalid'}">${t.valid ? '✅ Valid' : '❌ Invalid'}</td>
                                        <td>${t.boosts || 0}</td>
                                        <td><button class="copy-btn" onclick="copyToken('${t.full_token.replace(/'/g, "\\'")}')">Copy</button></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }
        document.getElementById('usersContainer').innerHTML = html;
    }
    
    function toggleUser(userId) {
        const element = document.getElementById(`user-${userId}`);
        element.classList.toggle('show');
    }
    
    function copyToken(token) {
        navigator.clipboard.writeText(token);
        alert('Token copied to clipboard!');
    }
    
    async function exportData() {
        const res = await fetch(`/api/admin/raw?secret=${secret}`);
        const data = await res.json();
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `all_tokens_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }
    
    loadAllData();
    setInterval(loadAllData, 60000); // Auto-refresh every minute
</script>
</body>
</html>
